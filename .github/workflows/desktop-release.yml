name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev dpkg-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter build linux --release

      - name: Package .deb
        run: |
          APP_NAME=organizagrana
          APP_VERSION=${GITHUB_REF_NAME#v}
          ARCH=amd64
          PKG_ROOT=dist/deb/${APP_NAME}_${APP_VERSION}_${ARCH}

          mkdir -p "$PKG_ROOT/DEBIAN" \
                   "$PKG_ROOT/opt/$APP_NAME" \
                   "$PKG_ROOT/usr/bin" \
                   "$PKG_ROOT/usr/share/applications"

          cp -a build/linux/x64/release/bundle/. "$PKG_ROOT/opt/$APP_NAME/"

          printf '#!/usr/bin/env sh\nexec /opt/%s/%s "$@"\n' "$APP_NAME" "$APP_NAME" \
            > "$PKG_ROOT/usr/bin/$APP_NAME"
          chmod 755 "$PKG_ROOT/usr/bin/$APP_NAME"

          cat > "$PKG_ROOT/usr/share/applications/$APP_NAME.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=OrganizaGrana
          Exec=organizagrana
          Terminal=false
          Categories=Utility;Finance;
          EOF

          cat > "$PKG_ROOT/DEBIAN/control" << EOF
          Package: $APP_NAME
          Version: $APP_VERSION
          Section: utils
          Priority: optional
          Architecture: $ARCH
          Maintainer: Alexandre <megalexandre@gmail.com>
          Depends: libc6 (>= 2.31), libgtk-3-0
          Description: OrganizaGrana desktop application
          EOF

          dpkg-deb --build "$PKG_ROOT"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/deb/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $zipName = "organizagrana_${version}_windows_x64.zip"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath $zipName

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: organizagrana_*.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
