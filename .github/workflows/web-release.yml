name: Build and Publish Web Image

on:
  push:
    branches:
      - main

concurrency:
  group: web-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: DOCKERHUB_TOKEN
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web

      - name: Validate Docker Hub token
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_TOKEN ausente ou vazio em Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Log in to Docker Hub with token
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DOCKERHUB_TOKEN" | docker login -u alexandreqrz --password-stdin

      - name: Build Docker image
        run: docker build -t alexandreqrz/organizagrana:latest .

      - name: Push Docker image
        run: docker push alexandreqrz/organizagrana:latest
